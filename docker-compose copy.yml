services:
  app:
    build: .
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./src:/var/www/html/src
      - ./.env:/var/www/html/.env
      - uploads_negocios:/var/www/html/src/public/uploads/negocios
      - uploads_evidencias:/var/www/html/src/public/uploads/evidencias
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - SOKETI_APP_ID=${SOKETI_APP_ID:-alcancia-app}
      - SOKETI_APP_KEY=${SOKETI_APP_KEY:-alcancia-key}
      - SOKETI_APP_SECRET=${SOKETI_APP_SECRET:-alcancia-secret}
      - SOKETI_HOST=${SOKETI_HOST:-soketi}
      - SOKETI_PORT=${SOKETI_PORT:-6001}
      - SOKETI_SCHEME=${SOKETI_SCHEME:-http}
      - SOKETI_WS_HOST=${SOKETI_WS_HOST:-websocket.systemautomatic.xyz}
      - SOKETI_WS_PORT=${SOKETI_WS_PORT:-443}
      - SOKETI_FORCE_TLS=${SOKETI_FORCE_TLS:-true}
      - SOKETI_METRICS_HOST=${SOKETI_METRICS_HOST:-metrics.systemautomatic.xyz}
      - SOKETI_METRICS_PORT=${SOKETI_METRICS_PORT:-9601}
    depends_on:
      - soketi
    restart: unless-stopped

  soketi:
    image: quay.io/soketi/soketi:latest-16-alpine
    environment:
      - SOKETI_DEBUG=1
      - SOKETI_DEFAULT_APP_ID=${SOKETI_APP_ID:-alcancia-app}
      - SOKETI_DEFAULT_APP_KEY=${SOKETI_APP_KEY:-alcancia-key}
      - SOKETI_DEFAULT_APP_SECRET=${SOKETI_APP_SECRET:-alcancia-secret}
    ports:
      - "${SOKETI_WS_PORT:-6001}:6001"
    restart: unless-stopped

volumes:
  uploads_negocios:
  uploads_evidencias:
